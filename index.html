/* -------- OPEN ENTITY -------- */
function openEntity(entity){

document.getElementById("dashboard").style.display="none"
document.getElementById("backBtn").style.display="block"
document.getElementById("searchBox").style.display="block"

document.getElementById("entityTitle").innerText=entity

displayTable(database[entity],"entityTable")

showQueries(entity)

}


/* -------- SHOW QUERIES -------- */
function showQueries(entity){

let container=document.getElementById("questions")
container.innerHTML=""

let entityQueries = queries[entity]

entityQueries.forEach((item,index)=>{

let div=document.createElement("div")
div.className="query"
div.setAttribute("data-query",item.q.toLowerCase())

div.innerHTML=`

<div class="query-top">

<div><b>${item.q}</b></div>

<button onclick="runQuery('${entity}',${index})">Show Result</button>

</div>

<div style="margin-top:5px;color:#555;"><i>${item.sql}</i></div>

<div class="result" id="result_${index}"></div>

`

container.appendChild(div)

})

}


/* -------- RUN QUERY -------- */
function runQuery(entity,index){

let data = database[entity]
let result = []

switch(entity){

/* -------- SPORT -------- */
case "SPORT":

if(index==0) result=data
if(index==1) result=data.filter(r=>r.Sport_ID==1)
if(index==2) result=[...data].sort((a,b)=>a.Sport_Name.localeCompare(b.Sport_Name))
if(index==3) result=[{Total_Sports:data.length}]
if(index==4) result=data.filter(r=>r.Sport_Name.startsWith("B"))
if(index==5) result=data.filter(r=>r.Sport_Name.endsWith("t"))
if(index==6) result=data.filter(r=>r.Sport_Name=="Tennis")
if(index==7) result=data.filter(r=>r.Sport_ID>3)
if(index==8) result=[...data].sort((a,b)=>b.Sport_Name.localeCompare(a.Sport_Name))
if(index==9) result=[...new Map(data.map(i=>[i.Sport_Name,i])).values()]

break


/* -------- TEAM -------- */

case "TEAM":

if(index==0) result=data
if(index==1) result=data.filter(r=>r.City=="Mumbai")
if(index==2) result=data.filter(r=>r.Sport_ID==1)
if(index==3) result=[...data].sort((a,b)=>a.Team_Name.localeCompare(b.Team_Name))
if(index==4) result=[{Total_Teams:data.length}]
if(index==5) result=data.filter(r=>r.City=="Delhi")
if(index==6) result=data.filter(r=>r.Sport_ID==2)
if(index==7) result=data.filter(r=>r.Team_Name.startsWith("B"))
if(index==8) result=[...data].sort((a,b)=>a.City.localeCompare(b.City))
if(index==9) result=[...new Map(data.map(i=>[i.City,i])).values()]

break


/* -------- PLAYER -------- */

case "PLAYER":

if(index==0) result=data
if(index==1) result=data.filter(r=>r.Skill>9)
if(index==2) result=data.filter(r=>r.Team_ID==101)
if(index==3) result=[...data].sort((a,b)=>a.Player_Name.localeCompare(b.Player_Name))
if(index==4) result=[{Total_Players:data.length}]
if(index==5) result=data.filter(r=>r.Sport_ID==2)
if(index==6) result=data.filter(r=>r.Skill>=9 && r.Skill<=10)
if(index==7) result=data.filter(r=>r.Team_ID==null)
if(index==8) result=[...data].sort((a,b)=>b.Skill-a.Skill)
if(index==9) result=[...new Map(data.map(i=>[i.Sport_ID,i])).values()]
if(index==10) result=data.filter(r=>r.Player_Name.startsWith("L"))
if(index==11) result=data.filter(r=>r.Player_Name.endsWith("i"))
if(index==12) result=[{Max_Skill:Math.max(...data.map(r=>r.Skill))}]
if(index==13) result=[{Min_Skill:Math.min(...data.map(r=>r.Skill))}]
if(index==14) result=[{Avg_Skill:(data.reduce((a,b)=>a+b.Skill,0)/data.length).toFixed(2)}]

break


/* -------- STADIUM -------- */

case "STADIUM":

if(index==0) result=data
if(index==1) result=data.filter(r=>r.City=="Mumbai")
if(index==2) result=[...data].sort((a,b)=>a.Stadium_Name.localeCompare(b.Stadium_Name))
if(index==3) result=[{Total_Stadiums:data.length}]
if(index==4) result=data.filter(r=>r.Stadium_Name.startsWith("W"))
if(index==5) result=data.filter(r=>r.Stadium_Name.endsWith("r"))
if(index==6) result=[...data].sort((a,b)=>a.City.localeCompare(b.City))
if(index==7) result=data.filter(r=>r.Stadium_ID==301)
if(index==8) result=data.filter(r=>r.City!="London")
if(index==9) result=[...new Map(data.map(i=>[i.City,i])).values()]

break


/* -------- SPONSOR -------- */

case "SPONSOR":

if(index==0) result=data
if(index==1) result=data.filter(r=>r.Sport_ID==1)
if(index==2) result=data.filter(r=>r.Team_ID==101)
if(index==3) result=data.filter(r=>r.Country=="USA")
if(index==4) result=[{Total_Sponsors:data.length}]
if(index==5) result=[...data].sort((a,b)=>a.Sponsor_Name.localeCompare(b.Sponsor_Name))
if(index==6) result=data.filter(r=>r.Sponsor_Name.startsWith("P"))
if(index==7) result=data.filter(r=>r.Sponsor_Name.endsWith("s"))
if(index==8) result=[...data].sort((a,b)=>a.Country.localeCompare(b.Country))
if(index==9) result=data.filter(r=>r.Country=="India")
if(index==10) result=[...new Map(data.map(i=>[i.Country,i])).values()]
if(index==11) result=data.filter(r=>r.Sport_ID>2)
if(index==12) result=data.filter(r=>r.Team_ID==103)

/* -------- TABLE DISPLAY -------- */
function displayTable(data,target){

let container=document.getElementById(target)

if(!data || data.length==0){
container.innerHTML="No Data"
return
}

let html="<table>"

let headers=Object.keys(data[0])

html+="<tr>"

headers.forEach(h=>{
html+=`<th>${h}</th>`
})

html+="</tr>"

data.forEach(row=>{

html+="<tr>"

headers.forEach(h=>{
html+=`<td>${row[h]}</td>`
})

html+="</tr>"

})

html+="</table>"

container.innerHTML=html

}


/* -------- SEARCH -------- */
function searchQuery(){

let input=document.getElementById("searchBox").value.toLowerCase()

document.querySelectorAll(".query").forEach(q=>{

let text=q.innerText.toLowerCase()

q.style.display=text.includes(input)?"block":"none"

})

}
